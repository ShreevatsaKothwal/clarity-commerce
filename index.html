<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMind | Commerce Readiness Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">🧠 ShopMind</div>
        <div class="header-stats" id="headerStats">
            <!-- Dynamically populated -->
        </div>
    </header>

    <main class="dashboard-container">
        <h1 class="page-title">Storefront Analysis</h1>
        <p class="page-subtitle">Identifying AI Competitive Displacement Risks</p>
        
        <!-- Store Summary Panel -->
        <div class="store-summary-panel" id="storeSummaryPanel" style="display: none;">
            <div class="summary-score">
                <div class="score-circle">
                    <span id="summaryScore">--</span><span style="font-size: 1rem;">%</span>
                </div>
                <div class="score-label">AI Readiness</div>
            </div>
            <div class="summary-details">
                <h3 id="summaryVerdict">Evaluating Store...</h3>
                <p id="summaryWarning"></p>
            </div>
        </div>
        
        <div class="grid-container" id="productGrid">
            <!-- Cards generated by app.js -->
        </div>
    </main>

    <!-- Modal for Detailed Inspector View -->
    <div class="modal-overlay" id="inspectorModal">
        <div class="modal-content" id="modalContentContainer">
            <!-- Populated by app.js -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
