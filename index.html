<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMind | Commerce Readiness Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">🧠 ShopMind</div>
        <div class="header-stats" id="headerStats">
            <!-- Dynamically populated -->
        </div>
    </header>

    <main class="dashboard-container">
        <h1 class="page-title">Storefront Analysis</h1>
        <p class="page-subtitle">Identifying AI Competitive Displacement Risks</p>
        
        <div class="grid-container" id="productGrid">
            <!-- Cards generated by app.js -->
        </div>
    </main>

    <!-- Modal for Detailed Inspector View -->
    <div class="modal-overlay" id="inspectorModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">×</button>
            <div class="modal-header">
                <span class="badge" id="modalBadge">CRITICAL</span>
                <h2 id="modalTitle">Product Title</h2>
            </div>
            
            <div class="modal-body">
                <div class="risk-section">
                    <h3>⚠️ Displacement Risk</h3>
                    <p id="modalRisk" class="risk-text"></p>
                    <div class="competitor-box">
                        <strong>Rival Advantage:</strong> <span id="modalCompetitor"></span>
                    </div>
                </div>

                <div class="split-view">
                    <!-- Layer 2A: Personas -->
                    <div class="persona-section">
                        <h3>🤖 AI Persona Verdicts</h3>
                        <div id="modalPersonas" class="persona-list"></div>
                    </div>
                    
                    <!-- Layer 2B: Deterministic -->
                    <div class="deterministic-section">
                        <h3>⚙️ Deterministic Python Engine Gaps</h3>
                        <ul id="modalDeterministic" class="deterministic-list"></ul>
                    </div>
                </div>

                <div class="fix-section">
                    <h3>💡 Suggested Action</h3>
                    <div class="fix-preview">
                        <p id="modalFixText"></p>
                    </div>
                    <button class="apply-btn">Accept & Apply Fix</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
